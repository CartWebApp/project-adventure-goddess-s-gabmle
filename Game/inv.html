<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="inv.css">
    <title>Document</title>
</head>
<body id="inventory">
    <section class="hyglyphs" id="topleft">
        <p class="hyg" id="slot1">Hyglyh 1</p>
        <p class="hyg" id="slot2">Hyglyph 2</p>
        <p class="hyg" id="slot3">Hyglyph 3</p>
        <p class="hyg" id="slot4">Hyglyph 4</p>
        <p class="hyg" id="slot5">Hyglyph 5</p>
        <p class="hyg" id="slot6">Hyglyph 6</p>
        <p class="hyg" id="slot7">Hyglyph 7</p>
        <p class="hyg" id="slot8">Hylgyph 8</p>
        <p class="hyg" id="slot9">Hyglyph 9</p>        
        <p class="hyg" id="slot10">Hyglyph 10</p>
    </section>

    <section class="stats" id="topright">
        <p id="status">Health: XXX (+XX) <br> Attack: XX <br> Chance: 50% (+XX%) <br> Karma: XX <br> HP From Helmet: XX <br> HP From Chest: XX <br> HP From Braces: XX <br> HP From Greaves: XX
        </p>

        <section class="hidden">
            <h2 id="itemname"></h2>
            <p id="itemdesc"></p>
        </section>
    </section>

    <section class="armor" id="bottomleft">
        <div class="accessories" id="helmet"></div>
        <div class="accessories" id="chest"></div>
        <div class="accessories" id="braces"></div>
        <div class="accessories" id="greaves"></div>
    </section>

    <section class="wpncontainer">
        <div class="weapon" id="bottomright"></div>
    </section>
    
</body>
</html>
