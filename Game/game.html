<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gamestyles.css">
    <title>The Goddess's Gamble</title>
</head>

<body id="body">
    <header>
        <div id="healthBar"></div>
        <section id="objective">
            <h2>Objective:</h2>
            <p id="objectiveP"></p>
        </section>
    </header>

    <article id="content">


        <section id="interaction">

            <section id="playerspeaking"></section>

            <div id="speakerPic"></div>

            <section id="dialogSection">
                <div id="textBox">
                    <h2 id="speaker">Speaker</h2>
                    <p id="action"></p>
                    <p id="dialog">Text Text Text Text</p>
                    <div id="choices">
                        <button id="poschoice"></button>
                        <button id="neuchoice"></button>
                        <button id="negchoice"></button>
                    </div>
                </div>
            </section>
        </section>
    </article>
      <script src="https://cdn.jsdelivr.net/npm/typewriter-effect@2.22.0/dist/core.min.js"></script>
    <script type="module" src="/game/ui.js"></script>
  
</body>

</html>
